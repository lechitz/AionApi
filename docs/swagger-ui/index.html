<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>aion-api - Swagger UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="aion-api OpenAPI interactive documentation"/>
  <link rel="stylesheet" href="./swagger-ui.css"/>
  <link rel="stylesheet" href="./custom.css"/>
</head>
<body>
  <header class="aion-swagger-header">
    <div class="aion-swagger-header__brand">aion-api</div>
    <div class="aion-swagger-header__meta">OpenAPI Explorer</div>
  </header>
  <div id="swagger-ui"></div>
  <script src="./swagger-ui-bundle.js"></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: "../swagger/swagger.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        docExpansion: "list",
        persistAuthorization: true,
        presets: [
          SwaggerUIBundle.presets.apis,
        ],
        layout: "BaseLayout",
      });
    };
  </script>
</body>
</html>
