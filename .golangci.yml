version: "2"

run:
  build-tags:
    - codeanalysis

formatters:
  enable:
    - goimports
    - golines
  settings:
    goimports:
      local-prefixes:
        - github.com/my/project
    golines:
      max-len: 200
  exclusions:
    warn-unused: true
    generated: strict
    paths:
      - ".*\\.my\\.go$"

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forbidigo
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - mirror
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - testifylint
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace

  exclusions:
    generated: strict
    paths:
      - "adapter/primary/graph/.*\\.go$"
    rules:
      - path: "internal/record/core/usecase/dashboard_insights.go"
        linters:
          - funlen
      - path: "internal/record/core/usecase/graph_projection_mapper.go"
        linters:
          - funlen
          - gocognit
      - path: "internal/platform/config/environments.go"
        linters:
          - golines
      - path: "internal/record/core/usecase/graph_projection_mapper_test.go"
        linters:
          - testpackage
      - path: "internal/record/core/usecase/record_projection_test.go"
        linters:
          - testpackage
      - path: "internal/record/core/usecase/transaction_test.go"
        linters:
          - testpackage
      - path: "hack/tools/graph-projection-export/config_test.go"
        linters:
          - gocognit
      - path: "internal/eventoutbox/adapter/secondary/db/repository/event_outbox_stats_repository_test.go"
        linters:
          - testpackage
      - path: "internal/eventoutbox/adapter/secondary/kafka/0_event_publisher_helpers_test.go"
        linters:
          - testpackage
      - path: "internal/eventoutbox/core/usecase/publish_pending_test.go"
        linters:
          - testpackage
      - path: "internal/record/adapter/secondary/db/repository/record_projection_test.go"
        linters:
          - testpackage
      - path: "internal/record/core/domain/graph_projection_test.go"
        linters:
          - testpackage
      - path: "internal/record/core/usecase/dashboard_insights_helpers_test.go"
        linters:
          - testpackage
      - path: "internal/record/core/usecase/dashboard_insights_scope_test.go"
        linters:
          - testpackage
      - path: '(.+)_test\.go'
        linters:
          - asasalint
      - path: '.*\.go'
        linters:
          - govet
        text: "shadow: declaration of"
      - path: '.*/main\.go$'
        linters:
          - revive

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map

    exhaustruct:
      exclude:
        - ^net/http.Client$
        - ^net/http.Cookie$
        - ^net/http.Request$
        - ^net/http.Response$
        - ^net/http.Server$
        - ^net/http.Transport$
        - ^net/url.URL$
        - ^os/exec.Cmd$
        - ^reflect.StructField$
        - ^github.com/Shopify/sarama.Config$
        - ^github.com/Shopify/sarama.ProducerMessage$
        - ^github.com/mitchellh/mapstructure.DecoderConfig$
        - ^github.com/prometheus/client_golang/.+Opts$
        - ^github.com/spf13/cobra.Command$
        - ^github.com/spf13/cobra.CompletionOptions$
        - ^github.com/stretchr/testify/mock.Mock$
        - ^github.com/testcontainers/testcontainers-go.+Request$
        - ^github.com/testcontainers/testcontainers-go.FromDockerfile$
        - ^golang.org/x/tools/go/analysis.Analyzer$
        - ^google.golang.org/protobuf/.+Options$
        - ^gopkg.in/yaml.v3.Node$

    funcorder:
      struct-method: false

    funlen:
      lines: 100
      statements: 50

    gochecksumtype:
      default-signifies-exhaustive: false

    gocognit:
      min-complexity: 20

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    inamedparam:
      skip-single-param: true

    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation:
        - funlen
        - gocognit
        - golines
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

issues:
  exclude-rules:
    - path: "internal/platform/docs/docs.go"
      linters:
        - gochecknoglobals
        - gochecknoinits
        - godot
