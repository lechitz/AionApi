query DashboardSnapshot($date: String!, $timezone: String) { dashboardSnapshot(date: $date, timezone: $timezone) { date timezone metrics { metricKey value previousValue delta trend valueType format precision sparklinePoints comparisonLabel metadata } goals { goalId title current target unit progress percentage status metricKey valueType format precision dueDate metadata } quickInsights healthScore activeGoals criticalGoals streakDays summary } }
