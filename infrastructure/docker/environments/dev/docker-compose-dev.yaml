services:
  postgres:
    image: postgres:16
    container_name: postgres-dev
    restart: always
    env_file:
      - .env.dev
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rede_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2
    container_name: redis-aion-dev
    ports:
      - "6379:6379"
    networks:
      - rede_local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  localstack:
    image: localstack/localstack:3
    container_name: localstack-dev
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack/init:/etc/localstack/init/ready.d
      - ../../../assets:/opt/localstack/assets:ro
    networks:
      - rede_local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../../../observability/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"   # OTLP HTTP
      - "9888:9888"   # /metrics Prometheus scrape
    networks:
      - rede_local
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ../../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rede_local
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=aion
      - GF_SECURITY_ADMIN_PASSWORD=aion
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../../observability/grafana/dashboards:/var/lib/grafana/dashboards
      - ../../../observability/grafana/provisioning:/etc/grafana/provisioning/dashboards
      - ../../../observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - rede_local
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger-dev
    restart: unless-stopped
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # UI Web
      - "4317:4317"     # OTLP gRPC (otel-collector)
    networks:
      - rede_local
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  loki:
    image: grafana/loki:2.9.8
    container_name: loki-dev
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ../../../observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data-dev:/loki
    networks:
      - rede_local
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:2.2.2
    container_name: fluent-bit-dev
    depends_on:
      - loki
    env_file:
      - .env.dev
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fluentbit-data:/fluent-bit/state
      - ../../../observability/fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ../../../observability/fluentbit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    networks:
      - rede_local
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-dev
    # OPTIMIZATION: Avoids re-downloading ~800MB on every 'make dev'
    # Use 'docker pull ollama/ollama:latest' manually when you want to update
    pull_policy: missing
    tty: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - rede_local
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    # GPU support enabled - NVIDIA RTX 3050 6GB
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  aion-chat:
    build:
      context: ../../../../../aion-chat
      dockerfile: infrastructure/docker/Dockerfile
    container_name: aion-chat-dev
    restart: unless-stopped
    env_file:
      - ../../../../../aion-chat/infrastructure/docker/environments/dev/.env.dev
    environment:
      # HOT RELOAD: Enables Uvicorn --reload
      - DEV_MODE=true
      - TZ=America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      # HOT RELOAD: Mounts Python code
      - ../../../../../aion-chat/src:/app/src
    networks:
      - rede_local
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  aion-api:
    image: aion-api:dev
    build:
      context: ../../../..
      # HOT RELOAD: Uses Dockerfile.dev with Air
      dockerfile: infrastructure/docker/environments/dev/Dockerfile.dev
    container_name: aion-api-dev
    env_file:
      - .env.dev
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "5001:5001" # REST + GraphQL
    volumes:
      # HOT RELOAD: Mounts Go code
      - ../../../..:/app
      # Preserves Go modules cache
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      otel-collector:
        condition: service_started
      aion-chat:
        condition: service_healthy
    networks:
      - rede_local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://localhost:$$HTTP_PORT$$HTTP_CONTEXT$$HTTP_API_ROOT$$HTTP_HEALTH_ROUTE\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  aionapi-dashboard:
    image: aionapi-dashboard:dev
    build:
      context: ../../../../../aionapi-dashboard
      dockerfile: infrastructure/docker/Dockerfile
    container_name: aionapi-dashboard-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - VITE_API_URL=http://localhost:5001/aion/api/v1
      - VITE_AUTH_URL=http://localhost:5001/aion/api/v1/auth
      - VITE_HEALTHCHECK_ENABLED=true
      - VITE_ASSETS_BASE_URL=http://localhost:4566/aion-assets/category-icons
    volumes:
      # HOT RELOAD: Mounts source code for Vite HMR
      - ../../../../../aionapi-dashboard/src:/app/src
      - ../../../../../aionapi-dashboard/public:/app/public
      - ../../../../../aionapi-dashboard/index.html:/app/index.html
      - ../../../../../aionapi-dashboard/vite.config.ts:/app/vite.config.ts
      - ../../../../../aionapi-dashboard/tsconfig.json:/app/tsconfig.json
      - ../../../../../aionapi-dashboard/tsconfig.app.json:/app/tsconfig.app.json
      - ../../../../../aionapi-dashboard/tsconfig.node.json:/app/tsconfig.node.json
      # Preserves node_modules (DO NOT overwrite!)
      - aionapi-dashboard-node-modules:/app/node_modules
    networks:
      - rede_local
    depends_on:
      aion-api:
        condition: service_healthy

networks:
  rede_local:
    name: rede_local
    driver: bridge

volumes:
  postgres-data-dev:
  grafana-data:
  localstack-data:
  ollama-models:
  loki-data-dev:
  fluentbit-data:
  # HOT RELOAD: Named volumes to preserve dependencies
  aionapi-dashboard-node-modules:
  go-mod-cache:
  go-build-cache:
