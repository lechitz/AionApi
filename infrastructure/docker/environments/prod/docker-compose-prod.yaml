version: "3.8"

services:
  postgres:
    image: postgres
    container_name: postgres-prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ./adapter/secondary/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - rede_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    container_name: redis-aion-prod
    ports:
      - "6379:6379"
    networks:
      - rede_local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.8
    container_name: loki-prod
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ../../../observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data-prod:/loki
    networks:
      - rede_local
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:2.2.2
    container_name: fluent-bit-prod
    depends_on:
      - loki
    env_file:
      - .env.prod
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fluentbit-data-prod:/fluent-bit/state
      - ../../../observability/fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ../../../observability/fluentbit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    networks:
      - rede_local
    restart: unless-stopped

  aion-api:
    image: aion-api:prod
    build:
      context: ../../..
      dockerfile: ../../../Dockerfile
    container_name: aion-api-prod
    env_file:
      - .env.prod
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rede_local

networks:
  rede_local:

volumes:
  postgres-data-prod:
  loki-data-prod:
  fluentbit-data-prod:
