receivers:
  otlp:
    protocols:
      http:
      grpc:

processors:
  filter/health:
    spans:
      exclude:
        match_type: regexp
        span_names:
          - "^/aion/health$"
  batch:

exporters:
  prometheus:
    endpoint: "0.0.0.0:9888"
  zipkin:
    endpoint: "http://jaeger:9411/api/v2/spans"
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: ["filter/health", batch]
      exporters: [zipkin, otlp/jaeger]
    metrics:
      receivers: [otlp]
      exporters: [prometheus]
