# Air configuration for the dedicated outbox publisher process

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/outbox-publisher"
  cmd = "go build -buildvcs=false -o ./tmp/outbox-publisher ./cmd/outbox-publisher"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "tests", "infrastructure", "docs", "notes", ".git", ".github", "bin"]
  exclude_regex = ["_test.go", "_mock.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  stop_on_error = false

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false

[misc]
  clean_on_exit = false

