name: Event Backbone Gate

on:
  workflow_dispatch:

jobs:
  event-backbone-gate:
    name: Event Backbone Gate (self-hosted)
    runs-on: self-hosted

    steps:
      - name: Checkout AionApi
        uses: actions/checkout@v4

      - name: Verify multi-repo workspace prerequisites
        run: make event-backbone-gate-preflight

      - name: Run official v2 gate
        run: make event-backbone-gate
