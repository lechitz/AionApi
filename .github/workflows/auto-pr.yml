# ---------------------------------------------------------------------
# Auto-PR Workflow for AionAPI (Go)
# Purpose: Automatically create Pull Requests when new branches are pushed.
# Trigger: Push events to specific branch prefixes (e.g., feature/, bugfix/).
# ---------------------------------------------------------------------

name: Auto-PR Workflow

on:
  push:
    branches:
      - feature/*
      - bugfix/*
      - refactor/*
      - docs/*
      - tests/*
      - devops/*
      - database/*

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          if [[ ! "${GITHUB_REF##refs/heads/}" =~ ^(feature|bugfix|refactor|docs|tests|devops|database)/.+$ ]]; then
            echo "Branch name '${GITHUB_REF##refs/heads/}' does not follow the naming convention!"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create pull request when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          existing_pr="$(gh pr list --repo "$REPOSITORY" --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            echo "Open PR already exists for branch $BRANCH_NAME: #$existing_pr"
            exit 0
          fi

          title="Auto PR - ${BRANCH_NAME}"
          body="$(cat <<EOF
          ## Aion - Pull Request Description

          This PR was automatically created for the branch \`$BRANCH_NAME\`.

          > Please ensure that this branch is linked to a corresponding issue before merging.
          EOF
          )"

          set +e
          pr_output="$(gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$title" \
            --body "$body" 2>&1)"
          pr_status=$?
          set -e

          if [[ $pr_status -eq 0 ]]; then
            echo "$pr_output"
            exit 0
          fi

          if [[ "$pr_output" == *"GitHub Actions is not permitted to create or approve pull requests"* ]]; then
            echo "Auto-PR skipped: repository settings do not allow GitHub Actions to create pull requests."
            echo "Enable: Settings > Actions > General > Workflow permissions > Allow GitHub Actions to create and approve pull requests."
            exit 0
          fi

          echo "$pr_output"
          exit $pr_status

      - name: Explain result
        run: |
          echo "Branch naming is valid."
          echo "An automatic PR was created if no open PR already existed for this branch."
