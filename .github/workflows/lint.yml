# ---------------------------------------------------------------------
# Lint Workflow for AionAPI (Go)
# Purpose: Run the repo's canonical CI verify entrypoint for lint and related gates.
# Extras: Ensures local and CI lint behavior stay aligned through a single make target.
# Trigger: Every PR targeting 'main'.
# NOTE: Your .golangci.yml should set `issues.exclude-generated: true`
#       or exclude internal/platform/docs to avoid flags on generated code.
# ---------------------------------------------------------------------

name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "*" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint:
    name: Golang Lint and Vet
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Setup Go from go.mod and use latest patch
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # 3) Pre-download modules to stabilize builds
      - name: Download modules
        run: go mod download

      # 4) Install the pinned development toolchain used by local and CI flows
      - name: Install development tools
        run: make -f makefiles/tooling.mk tools-install

      # 5) Add GOPATH/bin to PATH so installed tools are available
      - name: Add GOPATH/bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # 6) Ensure local caches exist
      - name: Ensure cache dirs exist
        run: |
          mkdir -p ~/.cache/go-build
          mkdir -p ~/.cache/golangci-lint

      # 7) Cache Go build artifacts
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      # 8) Cache golangci-lint cache
      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golangci-

      # 9) Print golangci-lint version for auditability
      - name: Check golangci-lint version
        run: golangci-lint --version

      # 10) Run the canonical CI verify target to keep parity with the repo workflow
      - name: Run CI verify
        run: make verify-ci
